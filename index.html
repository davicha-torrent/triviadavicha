<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colonial Trivia Game</title>
  <style>
    :root {
      --text-sm: clamp(0.9rem, 0.85rem + 0.25vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.1rem);
      --text-lg: clamp(1.25rem, 1.05rem + 0.8vw, 1.6rem);
      --text-xl: clamp(2rem, 1.3rem + 2.5vw, 3.4rem);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius: 1.25rem;
      --blue: #184a9c;
      --red: #a2293a;
      --card: rgba(255,255,255,0.16);
      --card-border: rgba(255,255,255,0.28);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --shadow: 0 18px 50px rgba(10, 15, 35, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      font-size: var(--text-base);
      color: var(--text);
      background: linear-gradient(135deg, var(--blue) 0%, #255fc0 34%, #7d3da0 58%, var(--red) 100%);
      display: grid;
      place-items: center;
      padding: var(--space-4);
    }

    button, img, input { display: block; }
    button, input { font: inherit; }
    button { cursor: pointer; border: none; }

    .app-shell {
      position: relative;
      width: min(100%, 720px);
      overflow: visible;
    }

    .corner-link {
      position: absolute;
      top: 0;
      right: -14rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 var(--space-5);
      border-radius: 999px;
      background: rgba(255,255,255,0.24);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.38);
      box-shadow: 0 10px 26px rgba(0,0,0,0.18);
      font-size: var(--text-sm);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .corner-link:hover {
      background: rgba(255,255,255,0.34);
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.24);
    }

    .app {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding: clamp(var(--space-5), 4vw, var(--space-8));
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    h1 {
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .score {
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .flag-box {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 1rem;
      padding: var(--space-4);
      margin-bottom: var(--space-5);
    }

    .flag-box img {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      margin: 0 auto;
      border-radius: 0.9rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }

    .country {
      text-align: center;
      margin-bottom: var(--space-5);
    }

    .country-name {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: var(--space-2);
    }

    .question {
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }

    .answer-btn {
      min-height: 64px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.22);
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .answer-btn:hover { transform: translateY(-2px); }
    .answer-btn.correct { background: rgba(37, 201, 122, 0.24); border-color: rgba(37, 201, 122, 0.55); }
    .answer-btn.wrong { background: rgba(255, 99, 132, 0.24); border-color: rgba(255, 99, 132, 0.55); }
    .answer-btn.dimmed { opacity: 0.6; }

    .status {
      min-height: 54px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      margin-bottom: var(--space-5);
      font-size: var(--text-sm);
    }

    .controls {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: var(--space-6);
    }

    .control-btn {
      min-height: 46px;
      padding: 0 var(--space-5);
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.24);
      font-weight: 600;
    }

    .hall-of-fame {
      width: min(100%, 420px);
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 1rem;
      padding: var(--space-4);
      box-shadow: 0 10px 26px rgba(10, 15, 35, 0.12);
    }

    .hall-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .hall-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hall-note {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .hall-list {
      display: grid;
      gap: var(--space-2);
    }

    .hall-empty {
      text-align: center;
      color: var(--muted);
      font-size: var(--text-sm);
      padding: var(--space-4) var(--space-2);
    }

    .hall-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: var(--space-3);
      min-height: 48px;
      padding: 0.7rem 0.85rem;
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .hall-row.top-1 {
      background: rgba(255, 214, 102, 0.16);
      border-color: rgba(255, 214, 102, 0.24);
    }

    .hall-row.top-2 {
      background: rgba(220, 226, 235, 0.12);
      border-color: rgba(220, 226, 235, 0.2);
    }

    .hall-row.top-3 {
      background: rgba(205, 127, 80, 0.14);
      border-color: rgba(205, 127, 80, 0.22);
    }

    .hall-rank {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-size: 0.84rem;
      font-weight: 700;
      color: rgba(255,255,255,0.96);
    }

    .hall-name {
      min-width: 0;
      font-size: 0.96rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hall-score {
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.96);
    }

    .hidden { display: none; }

    .popup-overlay,
    .name-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: grid;
      place-items: center;
      z-index: 100;
      animation: fadeIn 160ms ease;
      padding: var(--space-4);
    }

    .popup-overlay.hidden,
    .name-overlay.hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .popup-card,
    .name-card {
      border-radius: var(--radius);
      max-width: min(92vw, 420px);
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: popIn 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .popup-card {
      background: rgba(180, 20, 40, 0.92);
      border: 1px solid rgba(255, 120, 120, 0.4);
      padding: clamp(var(--space-5), 5vw, var(--space-8));
    }

    .name-card {
      background: rgba(38, 45, 92, 0.92);
      border: 1px solid rgba(255,255,255,0.18);
      padding: clamp(var(--space-5), 5vw, var(--space-8));
    }

    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .popup-icon {
      font-size: 2.2rem;
      margin-bottom: var(--space-3);
    }

    .popup-title,
    .name-title {
      font-size: var(--text-lg);
      font-weight: 700;
      margin-bottom: var(--space-3);
    }

    .popup-body,
    .name-body {
      font-size: var(--text-sm);
      color: rgba(255,255,255,0.88);
      line-height: 1.5;
      margin-bottom: var(--space-5);
    }

    .popup-btn,
    .name-btn,
    .name-skip-btn {
      min-height: 44px;
      padding: 0 var(--space-6);
      border-radius: 999px;
      color: var(--text);
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.26);
    }

    .popup-btn,
    .name-btn {
      background: rgba(255,255,255,0.22);
    }

    .popup-btn:hover,
    .name-btn:hover {
      background: rgba(255,255,255,0.32);
    }

    .name-form {
      display: grid;
      gap: var(--space-3);
    }

    .name-input {
      width: 100%;
      min-height: 48px;
      border-radius: 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.12);
      color: var(--text);
      padding: 0 1rem;
      outline: none;
    }

    .name-input::placeholder {
      color: rgba(255,255,255,0.62);
    }

    .name-input:focus {
      border-color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.18);
    }

    .name-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }

    .name-skip-btn {
      background: rgba(255,255,255,0.1);
    }

    .name-skip-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    @media (max-width: 1100px) {
      .app-shell {
        width: min(100%, 760px);
        padding-top: 56px;
      }

      .corner-link {
        top: 0;
        right: 0;
      }
    }

    @media (max-width: 640px) {
      .answers { grid-template-columns: 1fr; }

      .top {
        flex-direction: column;
        align-items: flex-start;
      }

      .corner-link {
        position: static;
        margin-bottom: var(--space-4);
        width: 100%;
      }

      .control-btn,
      .name-btn,
      .name-skip-btn {
        width: 100%;
      }

      .hall-of-fame {
        width: 100%;
      }

      .hall-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <a href="russian-fates.html" class="corner-link">Russian Fates Trivia</a>

    <main class="app">
      <div class="top">
        <h1>British or French?</h1>
        <div class="score" id="scoreLine">Streak: 0 | Best: 0</div>
      </div>

      <div class="flag-box">
        <img id="countryFlag" src="" alt="Country flag" width="420" height="315" loading="eager" decoding="async" />
      </div>

      <section class="country">
        <div class="country-name" id="countryName">Country</div>
        <div class="question">Was it a British colony or a French colony?</div>
      </section>

      <section class="answers" aria-label="Answer choices">
        <button class="answer-btn" data-choice="British">British Colony</button>
        <button class="answer-btn" data-choice="French">French Colony</button>
      </section>

      <div class="status" id="statusText">Choose an answer.</div>

      <div class="controls">
        <button class="control-btn" id="restartBtn">Restart</button>
      </div>

      <section class="hall-of-fame" aria-labelledby="hallTitle">
        <div class="hall-head">
          <div class="hall-title" id="hallTitle">Hall of Fame</div>
          <div class="hall-note">Global best streaks</div>
        </div>
        <div class="hall-list" id="leaderboardList"></div>
      </section>
    </main>
  </div>

  <div class="popup-overlay hidden" id="popupOverlay" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-card">
      <div class="popup-icon">&#10060;</div>
      <div class="popup-title" id="popupTitle">Wrong!</div>
      <div class="popup-body" id="popupBody"></div>
      <button class="popup-btn" id="popupOkBtn">Continue</button>
    </div>
  </div>

  <div class="name-overlay hidden" id="nameOverlay" role="dialog" aria-modal="true" aria-labelledby="nameTitle">
    <div class="name-card">
      <div class="name-title" id="nameTitle">Save your streak</div>
      <div class="name-body" id="nameBody">Enter your name to add your score to the global leaderboard.</div>
      <form class="name-form" id="nameForm">
        <input
          type="text"
          id="playerNameInput"
          class="name-input"
          maxlength="20"
          placeholder="Your name"
          autocomplete="name"
          required
        />
        <div class="name-actions">
          <button type="submit" class="name-btn">Save score</button>
          <button type="button" class="name-skip-btn" id="skipSaveBtn">Skip</button>
        </div>
      </form>
    </div>
  </div>

    const state = {
      deck: [],
      index: 0,
      answered: false,
      streak: 0,
      bestStreak: 0,
      lastShownName: null,
      pendingScore: null

    const countryName = document.getElementById('countryName');

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function currentCountry() {
      return state.deck[state.index];
    }

    function updateScore() {
      scoreLine.textContent = `Streak: ${state.streak} | Best: ${state.bestStreak}`;
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function fetchLeaderboard() {
      const url = `${SUPABASE_URL}/rest/v1/leaderboard?select=player,score,created_at,game&game=eq.${encodeURIComponent(GAME_NAME)}&order=score.desc,created_at.asc&limit=${MAX_LEADERBOARD_ENTRIES}`;

      const response = await fetch(url, {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`
        }
      });

      if (!response.ok) {
        throw new Error('Could not load leaderboard.');
      }

      return response.json();
    }

      const response = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({
          player: name,
          score,
          game: GAME_NAME
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || 'Could not save score.');
      }
    }

    async function renderLeaderboard() {
      leaderboardList.innerHTML = '<div class="hall-empty">Loading global leaderboard...</div>';

      try {
        const entries = await fetchLeaderboard();

        if (!entries.length) {
          leaderboardList.innerHTML = '<div class="hall-empty">No record holders yet. Set the first streak.</div>';
          return;
        }

        leaderboardList.innerHTML = entries
          .map((entry, index) => {
            const topClass = index === 0 ? 'top-1' : index === 1 ? 'top-2' : index === 2 ? 'top-3' : '';
            return `
              <div class="hall-row ${topClass}">
                <div class="hall-rank">#${index + 1}</div>
                <div class="hall-name">${escapeHtml(entry.player)}</div>
                <div class="hall-score">${entry.score}</div>
              </div>
            `;
          })
          .join('');
      } catch (error) {
        leaderboardList.innerHTML = '<div class="hall-empty">Leaderboard unavailable right now.</div>';
      }
    }

    async function addLeaderboardEntry(name, score) {
      const cleanName = name.trim().slice(0, 20);
      if (!cleanName || score <= 0) return;

      await insertLeaderboardEntry(cleanName, score);
      await renderLeaderboard();
    }

    function renderQuestion() {
      if (state.index >= state.deck.length) {
        let newDeck = shuffle(countries);
        if (state.lastShownName && newDeck.length > 1 && newDeck[0].name === state.lastShownName) {
          const swapIdx = 1 + Math.floor(Math.random() * (newDeck.length - 1));
          [newDeck[0], newDeck[swapIdx]] = [newDeck[swapIdx], newDeck[0]];
        }
        state.deck = newDeck;
        state.index = 0;
      }

      const item = currentCountry();
      state.lastShownName = item.name;
      state.answered = false;
      countryName.textContent = item.name;
      countryFlag.src = item.flag;
      countryFlag.alt = `${item.name} flag`;
      statusText.textContent = 'Choose an answer.';

      answerButtons.forEach(btn => {
        btn.disabled = false;
        btn.classList.remove('correct', 'wrong', 'dimmed');
      });

      updateScore();
    }

    function showWrongPopup(item, endedStreak) {
      popupBody.textContent = `${item.name} was a ${item.answer} colony. Your streak was ${endedStreak}.`;
      popupOverlay.classList.remove('hidden');
      popupOkBtn.focus();
    }

    function dismissWrongPopup() {
      popupOverlay.classList.add('hidden');

      if (state.pendingScore && state.pendingScore > 0) {
        openNameModal(state.pendingScore);
      } else {
        renderQuestion();
      }
    }

    function openNameModal(score) {
      state.pendingScore = score;
      nameBody.textContent = `Wrong! Your streak was ${score}. Enter your name to claim a place in the Hall of Fame.`;
      playerNameInput.value = '';
      nameOverlay.classList.remove('hidden');
      playerNameInput.focus();
    }

    function closeNameModal() {
      nameOverlay.classList.add('hidden');
      state.pendingScore = null;
      renderQuestion();
    }

    function chooseAnswer(choice) {
      if (state.answered) return;

      state.answered = true;
      const item = currentCountry();
      const correct = choice === item.answer;
      state.index += 1;

      answerButtons.forEach(btn => {
        btn.disabled = true;
        const value = btn.dataset.choice;
        if (value === item.answer) btn.classList.add('correct');
        else if (value === choice) btn.classList.add('wrong');
        else btn.classList.add('dimmed');
      });

      if (correct) {
        state.streak += 1;
        if (state.streak > state.bestStreak) state.bestStreak = state.streak;
        statusText.textContent = `Correct! Streak: ${state.streak}`;
        updateScore();
        setTimeout(renderQuestion, 900);
      } else {
        const ended = state.streak;
        state.streak = 0;
        updateScore();
        state.pendingScore = ended;
        showWrongPopup(item, ended);
      }
    }

    function restartGame() {
      state.deck = shuffle(countries);
      state.index = 0;
      state.answered = false;
      state.streak = 0;
      state.bestStreak = 0;
      state.lastShownName = null;
      state.pendingScore = null;

      popupOverlay.classList.add('hidden');
      nameOverlay.classList.add('hidden');

      updateScore();
      renderQuestion();
    }

    answerButtons.forEach(btn =>
      btn.addEventListener('click', () => chooseAnswer(btn.dataset.choice))
    );

    popupOkBtn.addEventListener('click', dismissWrongPopup);

    popupOverlay.addEventListener('click', e => {
      if (e.target === popupOverlay) dismissWrongPopup();
    });

    nameForm.addEventListener('submit', async e => {
      e.preventDefault();
      const name = playerNameInput.value.trim();

      if (!name) {
        playerNameInput.focus();
        return;
      }

      const saveButton = nameForm.querySelector('.name-btn');
      saveButton.disabled = true;
      saveButton.textContent = 'Saving...';

      try {
        await addLeaderboardEntry(name, state.pendingScore || 0);
        closeNameModal();
      } catch (error) {
        nameBody.textContent = 'Could not save score right now. Check your Supabase URL, key, table, and policies.';
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = 'Save score';
      }
    });

    skipSaveBtn.addEventListener('click', closeNameModal);
    restartBtn.addEventListener('click', restartGame);

    renderLeaderboard();
    restartGame();
  </script>
</body>
</html>
